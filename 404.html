<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Sima Qadeer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Source+Serif+4:wght@400&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --paper:#F5F0E8; --ink:#2E1A47; --coral:#D4654A; }
    * { box-sizing:border-box; margin:0; }
    body { font-family:'Source Serif 4',Georgia,serif; background:var(--paper); color:var(--ink); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .wrap { text-align:center; max-width:420px; }
    h1 { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:3rem; margin-bottom:0.5rem; }
    p { font-size:1rem; line-height:1.6; margin-bottom:2rem; color:#5A4A6A; }
    a { font-family:'Space Grotesk',sans-serif; font-size:0.875rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--coral); text-decoration:none; border-bottom:1px solid var(--coral); padding-bottom:2px; transition:opacity 0.2s; }
    a:hover { opacity:0.7; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <p>This page has wandered off like an unfinished story. Let’s get you back to Sima’s world.</p>
    <a href="/">Back to home</a>
  </div>
</body>
</html>
