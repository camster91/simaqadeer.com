    <!--
      Contact-form mailto bridge.
      The built React bundle POSTs the contact form to /api/contact, then
      renders a "Thank you" state on success. The bundle does NOT open the
      server's returned mailto: URL — it only checks `success: true`.

      This shim wraps window.fetch: when a /api/contact POST comes back with
      a { success: true, mailto: "..." } payload, it opens the mailto so the
      user's mail client fires. The bundle still sees success and shows the
      Thank you state. This is a one-line wrapper that keeps the contact
      form functional without rebuilding the bundle.
    -->
    <script>
      (function () {
        var origFetch = window.fetch.bind(window);
        window.fetch = function (input, init) {
          var p = origFetch(input, init);
          // Only intercept /api/contact POSTs.
          var url = typeof input === 'string' ? input : (input && input.url) || '';
          if (!(init && init.method && init.method.toUpperCase() === 'POST' &&
                url.indexOf('/api/contact') !== -1)) {
            return p;
          }
          // Clone the response so the bundle can still read it; then open
          // the mailto on the side. If mailto fails (no mail client, popup
          // blocked) the bundle still completes its success path.
          return p.then(function (res) {
            try {
              var cloned = res.clone();
              cloned.json().then(function (j) {
                if (j && j.success && j.mailto) {
                  window.open(j.mailto, '_self');
                }
              }).catch(function () { /* not JSON — ignore */ });
            } catch (e) { /* defensive: never let the shim break the fetch */ }
            return res;
          });
        };
      })();
